# ==========================================
# Ride Sharing Platform - Application Config
# ==========================================

# Server
server.port=${PORT:8080}

# MySQL Database
# In production, DATABASE_URL should be a full JDBC URL like:
# jdbc:mysql://host:port/dbname?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/Bookar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Bandi2005@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Config
jwt.secret=${JWT_SECRET:dGhpcklzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JSaWRlU2hhcmluZ0FwcDIwMjQ=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.rideshare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
